---
- name: Setup Base Server
  hosts: all
  become: true
  vars:
    app_user: inbework

  tasks:

    # ── System Update ──────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install base dependencies
      apt:
        name:
          - curl
          - wget
          - git
          - unzip
          - ca-certificates
          - gnupg
          - lsb-release
          - apt-transport-https
          - software-properties-common
        state: present

    # ── Install Node.js ────────────────────────────────────────
    - name: Download NodeSource setup script
      get_url:
        url: https://deb.nodesource.com/setup_20.x
        dest: /tmp/nodesource_setup.sh
        mode: '0755'

    - name: Run NodeSource setup script
      shell: bash /tmp/nodesource_setup.sh

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: yes

    - name: Verify Node.js
      command: node --version
      register: node_version

    - name: Show Node.js version
      debug:
        msg: "Node.js: {{ node_version.stdout }}"

    # ── Install Bun ────────────────────────────────────────────
   # ── Install Bun ────────────────────────────────────────────
    - name: Install Bun
      shell: curl -fsSL https://bun.sh/install | bash
      environment:
        HOME: /root
      args:
        creates: /root/.bun/bin/bun

    - name: Symlink Bun to /usr/local/bin
      file:
        src: /root/.bun/bin/bun
        dest: /usr/local/bin/bun
        state: link

    - name: Verify Bun
      command: bun --version
      register: bun_version

    - name: Show Bun version
      debug:
        msg: "Bun: {{ bun_version.stdout }}"
        
    # ── Install Docker ─────────────────────────────────────────
    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker repository
      shell: |
        echo \
          "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
          tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update apt after adding Docker repo
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Add user to docker group
      user:
        name: "{{ app_user }}"
        groups: docker
        append: yes

    - name: Verify Docker
      command: docker --version
      register: docker_version

    - name: Show Docker version
      debug:
        msg: "Docker: {{ docker_version.stdout }}"

    - name: Verify Docker Compose
      command: docker compose version
      register: compose_version

    - name: Show Docker Compose version
      debug:
        msg: "Docker Compose: {{ compose_version.stdout }}"

    # ── Done ───────────────────────────────────────────────────
    - name: Installation complete
      debug:
        msg: |
          ✅ Setup selesai!
          - Node.js : {{ node_version.stdout }}
          - Bun     : {{ bun_version.stdout }}
          - Docker  : {{ docker_version.stdout }}