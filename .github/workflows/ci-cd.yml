name: CI CD - Bot Whatsapp Telegram

on:
  push:
    branches:
      - cicd

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck || true

  cd:
    runs-on: self-hosted
    needs: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy env
        run: |
          if [ -f /var/www/hono-bot-wa/.env ]; then
            cp /var/www/hono-bot-wa/.env .env
          fi

      - name: Stop old container
        run: docker compose down || true

      - name: Clean chromium lock
        run: |
          mkdir -p /opt/wa-auth
          rm -rf /opt/wa-auth/Singleton* /opt/wa-auth/lockfile

      - name: Build & Run
        run: docker compose up -d --build

      - name: Cleanup unused images
        run: docker image prune -f